<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DECODER | Профиль</title>
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.3/themes/dark-hive/jquery-ui.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    .register-page { max-width: 550px; margin: 0 auto; padding: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; color: #888; font-size: 0.8rem; margin-bottom: 0.3rem; letter-spacing: 1px; }
    .form-group input { width: 100%; padding: 0.6rem; font-family: monospace; font-size: 0.9rem; }
    .strength-bar { height: 6px; background: #333; margin-top: 0.3rem; border-radius: 3px; }
    .strength-bar div { height: 100%; border-radius: 3px; transition: width 0.3s; }
  </style>
</head>
<body>
  <div class="register-page">
    <header class="library-header">
      <div class="header-line"><span class="prompt-symbol">></span></div>
      <h1 class="main-title" style="font-size:2.5rem;"><span class="glitch-text" data-text="ПРОФИЛЬ">ПРОФИЛЬ</span></h1>
      <div class="subtitle-container">
        <span class="line-decoration"></span>
        <p class="subtitle">jQuery UI Tabs + Datepicker</p>
        <span class="line-decoration"></span>
      </div>
    </header>

    <!-- Tabs (jQuery UI) -->
    <div id="profileTabs">
      <ul>
        <li><a href="#tab-login">ВХОД</a></li>
        <li><a href="#tab-register">РЕГИСТРАЦИЯ</a></li>
      </ul>

      <!-- Вкладка ВХОД -->
      <div id="tab-login">
        <form id="loginForm">
          <div class="form-group">
            <label>EMAIL</label>
            <input type="text" id="loginEmail" class="ui-widget ui-corner-all" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>ПАРОЛЬ</label>
            <input type="password" id="loginPass" class="ui-widget ui-corner-all" placeholder="••••••••">
          </div>
          <button type="submit" class="ui-button ui-widget ui-corner-all" style="width:100%;padding:0.8rem;font-size:1rem;">ВОЙТИ</button>
        </form>
      </div>

      <!-- Вкладка РЕГИСТРАЦИЯ -->
      <div id="tab-register">
        <form id="registerForm">
          <div class="form-group">
            <label>ИМЯ</label>
            <input type="text" id="regName" class="ui-widget ui-corner-all" placeholder="Ваше имя">
          </div>
          <div class="form-group">
            <label>ФАМИЛИЯ</label>
            <input type="text" id="regSurname" class="ui-widget ui-corner-all" placeholder="Ваша фамилия">
          </div>
          <div class="form-group">
            <label>EMAIL</label>
            <input type="text" id="regEmail" class="ui-widget ui-corner-all" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>ДАТА РОЖДЕНИЯ</label>
            <input type="text" id="regBirth" class="ui-widget ui-corner-all" placeholder="дд.мм.гггг">
          </div>
          <div class="form-group">
            <label>СТРАНА</label>
            <input type="text" id="regCountry" class="ui-widget ui-corner-all" placeholder="Название страны...">
          </div>
          <div class="form-group">
            <label>ПАРОЛЬ</label>
            <input type="password" id="regPass" class="ui-widget ui-corner-all" placeholder="••••••••">
            <div class="strength-bar"><div id="strengthFill" style="width:0%;"></div></div>
          </div>
          <button type="submit" class="ui-button ui-widget ui-corner-all" style="width:100%;padding:0.8rem;font-size:1rem;">ЗАРЕГИСТРИРОВАТЬСЯ</button>
        </form>
      </div>
    </div>

    <button class="nav-button" onclick="location.href='index.html'" style="margin:1.5rem auto;display:flex;">НА ГЛАВНУЮ</button>
  </div>

  <!-- Диалог -->
  <div id="regDialog" title="Результат" style="display:none;">
    <p id="regDialogMsg"></p>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.3/jquery-ui.min.js"></script>
  <script>
    $(function() {
      // Tabs (jQuery UI)
      $('#profileTabs').tabs({
        show: { effect: 'fade', duration: 300 },
        hide: { effect: 'fade', duration: 200 }
      });

      // Datepicker (jQuery UI)
      $('#regBirth').datepicker({
        dateFormat: 'dd.mm.yy',
        changeYear: true,
        yearRange: '1950:2010',
        showAnim: 'slideDown'
      });

      // Autocomplete страны (jQuery UI)
      const countries = ['Россия', 'Беларусь', 'Казахстан', 'Украина', 'Армения', 'Узбекистан', 'Кыргызстан', 'Таджикистан'];
      $('#regCountry').autocomplete({ source: countries });

      // Dialog (jQuery UI)
      $('#regDialog').dialog({
        autoOpen: false,
        width: 400,
        modal: true,
        buttons: { 'OK': function() { $(this).dialog('close'); } }
      });

      // Сила пароля
      $('#regPass').on('input', function() {
        const val = $(this).val();
        let strength = 0;
        if (val.length >= 6) strength += 25;
        if (val.length >= 8) strength += 25;
        if (/[A-ZА-ЯЁ]/.test(val)) strength += 25;
        if (/[0-9!@#$%]/.test(val)) strength += 25;
        $('#strengthFill').css({
          width: strength + '%',
          background: strength <= 25 ? '#FF3333' : strength <= 50 ? '#FFD700' : strength <= 75 ? '#00BFFF' : '#00FF41'
        });
      });

      // Регистрация
      $('#registerForm').on('submit', function(e) {
        e.preventDefault();
        const name = $('#regName').val().trim();
        const email = $('#regEmail').val().trim();
        if (name.length >= 2 && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email) && $('#regPass').val().length >= 6) {
          const data = { name, surname: $('#regSurname').val(), email, birth: $('#regBirth').val(), country: $('#regCountry').val() };
          localStorage.setItem('decoder_user', JSON.stringify(data));
          $('#regDialogMsg').html('<span style="color:#00FF41;">✅ Регистрация успешна!</span>');
          $('#regDialog').dialog('open');
        } else {
          $('#regDialogMsg').html('<span style="color:#FF3333;">❌ Проверьте поля!</span>');
          $('#regDialog').dialog('open');
        }
      });

      // Вход
      $('#loginForm').on('submit', function(e) {
        e.preventDefault();
        const saved = JSON.parse(localStorage.getItem('decoder_user') || '{}');
        if ($('#loginEmail').val() === saved.email && $('#loginPass').val() === saved.pass) {
          $('#regDialogMsg').html('<span style="color:#00FF41;">✅ Добро пожаловать, ' + saved.name + '!</span>');
        } else {
          $('#regDialogMsg').html('<span style="color:#FF3333;">❌ Неверный email или пароль</span>');
        }
        $('#regDialog').dialog('open');
      });
    });
  </script>
</body>
</html>
