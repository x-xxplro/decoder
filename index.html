<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DECODER | Классические шифры</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <div class="terminal-loader">
      <span class="prompt">></span> Загрузка системы...
      <div class="loading-bar"><div class="progress"></div></div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
  <button id="themeToggle" style="position: fixed; top: 10px; right: 10px; z-index: 9999; font-size: 0.8rem;">[ 🌙 ТЕМА ]</button>
  <div id="marquee" style="position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; border-top: 1px solid #333; padding: 8px 0; z-index: 9998; overflow: hidden;">
  <div id="marqueeText" style="white-space: nowrap; color: #00FF41; font-family: monospace; font-size: 0.8rem;">
    🔐 DECODER — Классические шифры: Цезарь • Атбаш • Полибий • Виженер • Морзе • Плейфер • Расшифруй историю! 🔓
  </div>
</div>
<div id="marquee" style="position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; border-top: 1px solid #333; padding: 8px 0; z-index: 9998; overflow: hidden; display: none;">
  <div id="marqueeText" style="white-space: nowrap; color: #00FF41; font-family: monospace; font-size: 0.8rem;">
    🔐 DECODER — Классические шифры: Цезарь • Атбаш • Полибий • Виженер • Морзе • Плейфер • Расшифруй историю! 🔓
  </div>
  <button id="marqueeClose" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: transparent; border: 1px solid #00FF41; color: #00FF41; cursor: pointer; font-family: monospace; font-size: 0.7rem; padding: 2px 8px; margin: 0;">[X]</button>
</div>
<div id="marqueeControls" style="position: fixed; bottom: 40px; right: 10px; z-index: 9999; display: none; gap: 5px;">
  <button id="marqueeDir" style="font-size:0.6rem;padding:3px 6px;">[ ↔ ]</button>
  <button id="marqueeSpeed" style="font-size:0.6rem;padding:3px 6px;">[ ▶▶ ]</button>
  <button id="marqueeColor" style="font-size:0.6rem;padding:3px 6px;">[ 🎨 ]</button>
</div>
</body>
</html>
